<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>元素マージパズル</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overscroll-behavior:none; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display:flex; flex-direction:column; align-items:center;
    touch-action: none;
    user-select:none; -webkit-user-select:none;
    min-height:100%;
  }
  .wrap { width:min(94vw, 460px); padding:10px 0 20px; }
  header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:8px; }
  h1 { font-size:1.3rem; letter-spacing:.05em; }
  h1 small { display:block; font-size:.65rem; color:#94a3b8; font-weight:normal; margin-top:2px; }
  .stats { display:flex; gap:6px; }
  .stat {
    background:#1e293b; border-radius:8px; padding:4px 10px; text-align:center; min-width:62px;
  }
  .stat .label { font-size:.6rem; color:#94a3b8; }
  .stat .value { font-size:1rem; font-weight:bold; }
  .bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .hint { font-size:.7rem; color:#94a3b8; }
  button {
    background:#334155; color:#e2e8f0; border:none; border-radius:8px;
    padding:8px 14px; font-size:.8rem; font-weight:bold; cursor:pointer;
  }
  button:active { background:#475569; }
  .board {
    position:relative; width:100%; aspect-ratio:1/1;
    background:#1e293b; border-radius:12px;
    touch-action:none;
  }
  .bg-cell { position:absolute; background:#0f172a55; border-radius:8px; }
  .tile {
    position:absolute; border-radius:8px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:#fff; line-height:1.05;
    transition: transform .12s ease;
    box-shadow: 0 2px 6px rgba(0,0,0,.35);
    will-change: transform;
  }
  .tile .num { position:absolute; top:.45em; left:.6em; font-size:1.1em; opacity:.85; }
  .tile .sym { font-size:3.1em; font-weight:bold; text-shadow:0 1px 2px rgba(0,0,0,.3); }
  .tile .name { font-size:1em; opacity:.92; margin-top:.2em; }
  .tile.new { animation: appear .16s ease .1s backwards; }
  .tile.pop { animation: pop .18s ease .08s backwards; }
  @keyframes appear { from { transform: scale(0); } }
  @keyframes pop {
    0% { transform: scale(0); }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  /* 元素カテゴリの色 */
  .cat-nonmetal { background:linear-gradient(135deg,#3b82f6,#2563eb); }
  .cat-noble    { background:linear-gradient(135deg,#a78bfa,#7c3aed); }
  .cat-alkali   { background:linear-gradient(135deg,#f87171,#dc2626); }
  .cat-alkaline { background:linear-gradient(135deg,#fb923c,#ea580c); }
  .cat-metalloid{ background:linear-gradient(135deg,#2dd4bf,#0d9488); }
  .cat-halogen  { background:linear-gradient(135deg,#4ade80,#16a34a); }
  .cat-post     { background:linear-gradient(135deg,#94a3b8,#64748b); }
  .cat-trans    { background:linear-gradient(135deg,#facc15,#ca8a04); color:#1e293b !important; }
  .cat-trans .sym { text-shadow:none; }

  .toast {
    position:fixed; left:50%; bottom:18px; transform:translateX(-50%) translateY(120%);
    background:#1e293b; border:1px solid #334155; border-radius:12px;
    padding:10px 16px; font-size:.78rem; max-width:90vw; text-align:center;
    transition: transform .3s ease; z-index:20; box-shadow:0 4px 16px rgba(0,0,0,.5);
  }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast b { color:#facc15; }

  .overlay {
    position:absolute; inset:0; border-radius:12px;
    background:rgba(15,23,42,.86); backdrop-filter:blur(2px);
    display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px;
    text-align:center; z-index:10; padding:16px;
  }
  .overlay.show { display:flex; }
  .overlay h2 { font-size:1.5rem; }
  .overlay p { font-size:.85rem; color:#cbd5e1; }
  .overlay .btns { display:flex; gap:10px; }
  .overlay button.primary { background:#3b82f6; }

  .legend { margin-top:10px; display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
  .legend span { font-size:.6rem; padding:2px 8px; border-radius:99px; color:#fff; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>元素マージ<small>クリアは Ne・真のクリアは Mg！</small></h1>
    <div class="stats">
      <div class="stat"><div class="label">スコア</div><div class="value" id="score">0</div></div>
      <div class="stat"><div class="label">ベスト</div><div class="value" id="best">0</div></div>
      <div class="stat"><div class="label">最高元素</div><div class="value" id="bestElem">-</div></div>
    </div>
  </header>
  <div class="bar">
    <div class="hint">スワイプ（PCは矢印キー）で移動</div>
    <button id="newGame">新しいゲーム</button>
  </div>
  <div class="board" id="board">
    <div class="overlay" id="overlay">
      <h2 id="ovTitle"></h2>
      <p id="ovText"></p>
      <div class="btns">
        <button class="primary" id="ovRestart">もう一度</button>
        <button id="ovContinue" style="display:none">続ける</button>
      </div>
    </div>
  </div>
  <div class="legend">
    <span style="background:#334155">元素はぜんぶちがう色！同じ色＝同じ元素＝合体できる</span>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
// ===== 元素データ =====
const ELEMENTS = {
  1:  { sym:"H",  name:"水素",        cat:"nonmetal",  fun:"宇宙で一番多い元素。ロケットの燃料にも！" },
  2:  { sym:"He", name:"ヘリウム",    cat:"noble",     fun:"吸うと声が高くなるあのガス。風船にも使う" },
  3:  { sym:"Li", name:"リチウム",    cat:"alkali",    fun:"スマホの電池に入っている軽い金属" },
  4:  { sym:"Be", name:"ベリリウム",  cat:"alkaline",  fun:"宝石のエメラルドに含まれている" },
  5:  { sym:"B",  name:"ホウ素",      cat:"metalloid", fun:"ゴキブリ退治のホウ酸団子でおなじみ" },
  6:  { sym:"C",  name:"炭素",        cat:"nonmetal",  fun:"ダイヤモンドも鉛筆の芯も同じ炭素！" },
  7:  { sym:"N",  name:"窒素",        cat:"nonmetal",  fun:"空気の約78%は窒素" },
  8:  { sym:"O",  name:"酸素",        cat:"nonmetal",  fun:"呼吸に必須。空気の約21%" },
  9:  { sym:"F",  name:"フッ素",      cat:"halogen",   fun:"歯磨き粉に入っている。反応性は最強クラス" },
  10: { sym:"Ne", name:"ネオン",      cat:"noble",     fun:"ネオンサインの赤い光の正体" },
  11: { sym:"Na", name:"ナトリウム",  cat:"alkali",    fun:"食塩(NaCl)の成分。水に入れると爆発する！" },
  12: { sym:"Mg", name:"マグネシウム",cat:"alkaline",  fun:"花火の白い光。燃えるとまぶしすぎる" },
  13: { sym:"Al", name:"アルミニウム",cat:"post",      fun:"1円玉やアルミホイルの材料" },
  14: { sym:"Si", name:"ケイ素",      cat:"metalloid", fun:"半導体の材料。シリコンバレーの語源" },
  15: { sym:"P",  name:"リン",        cat:"nonmetal",  fun:"マッチの火薬に使われている" },
  16: { sym:"S",  name:"硫黄",        cat:"nonmetal",  fun:"温泉のにおいの正体" },
  17: { sym:"Cl", name:"塩素",        cat:"halogen",   fun:"プールの消毒でおなじみ" },
  18: { sym:"Ar", name:"アルゴン",    cat:"noble",     fun:"空気中で3番目に多い気体" },
  19: { sym:"K",  name:"カリウム",    cat:"alkali",    fun:"バナナにたっぷり含まれている" },
  20: { sym:"Ca", name:"カルシウム",  cat:"alkaline",  fun:"骨や歯の主成分" },
  21: { sym:"Sc", name:"スカンジウム",cat:"trans",     fun:"自転車のフレームに使われるレア金属" },
  22: { sym:"Ti", name:"チタン",      cat:"trans",     fun:"軽くて強い。メガネや人工関節に" },
  23: { sym:"V",  name:"バナジウム",  cat:"trans",     fun:"工具を強くする金属" },
  24: { sym:"Cr", name:"クロム",      cat:"trans",     fun:"ピカピカのメッキの正体" },
  25: { sym:"Mn", name:"マンガン",    cat:"trans",     fun:"乾電池に入っている" },
  26: { sym:"Fe", name:"鉄",          cat:"trans",     fun:"血液の赤血球にも入っている" },
  27: { sym:"Co", name:"コバルト",    cat:"trans",     fun:"きれいな青色の顔料になる" },
  28: { sym:"Ni", name:"ニッケル",    cat:"trans",     fun:"50円玉や100円玉に使われている" },
  29: { sym:"Cu", name:"銅",          cat:"trans",     fun:"10円玉と電線の材料" },
  30: { sym:"Zn", name:"亜鉛",        cat:"trans",     fun:"トタン屋根のメッキに使われる" },
};
const MAX_N = 30;
const GOALS = [10, 12]; // Ne=クリア、Mg=真のクリア

// ===== 状態 =====
const SIZE = 4;
let grid, tiles, nextId, score, moved, goalIdx, awaiting, over;
let best = +(localStorage.getItem("elemMergeBest") || 0);
let bestElem = +(localStorage.getItem("elemMergeBestElem") || 0);
let discovered = new Set();

const boardEl = document.getElementById("board");
const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const bestElemEl = document.getElementById("bestElem");
const overlay = document.getElementById("overlay");
const ovTitle = document.getElementById("ovTitle");
const ovText = document.getElementById("ovText");
const ovContinue = document.getElementById("ovContinue");
const toastEl = document.getElementById("toast");

let cell = 0, gap = 0;
const tileEls = new Map();

// ===== レイアウト =====
function layout() {
  const w = boardEl.clientWidth;
  gap = Math.round(w * 0.028);
  cell = (w - gap * (SIZE + 1)) / SIZE;
  // 背景セル
  boardEl.querySelectorAll(".bg-cell").forEach(e => e.remove());
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    const d = document.createElement("div");
    d.className = "bg-cell";
    d.style.width = d.style.height = cell + "px";
    d.style.left = (gap + c * (cell + gap)) + "px";
    d.style.top = (gap + r * (cell + gap)) + "px";
    boardEl.appendChild(d);
  }
  for (const t of tiles.values()) positionEl(t);
}

function positionEl(t) {
  const el = tileEls.get(t.id);
  if (!el) return;
  el.style.width = el.style.height = cell + "px";
  el.style.fontSize = (cell * 0.1) + "px";
  el.style.transform = `translate(${gap + t.c * (cell + gap)}px, ${gap + t.r * (cell + gap)}px)`;
}

function makeEl(t, cls) {
  const e = ELEMENTS[t.n] || { sym:"?", name:"未知", cat:"post" };
  const el = document.createElement("div");
  el.className = "tile" + (cls ? ` ${cls}` : "");
  // 元素ごとに全部ちがう色（黄金角で隣の番号ほど大きく色が変わる）
  const hue = Math.round((t.n * 137.508) % 360);
  el.style.background = `linear-gradient(135deg, hsl(${hue},78%,57%), hsl(${hue},72%,42%))`;
  if (hue > 40 && hue < 80) el.style.color = "#1e293b";
  el.innerHTML = `<span class="num">${t.n}</span><span class="sym">${e.sym}</span><span class="name">${e.name}</span>`;
  tileEls.set(t.id, el);
  boardEl.appendChild(el);
  positionEl(t);
  return el;
}

function removeEl(id, delay) {
  const el = tileEls.get(id);
  tileEls.delete(id);
  if (el) setTimeout(() => el.remove(), delay);
}

// ===== ゲームロジック =====
function newGame() {
  for (const id of tileEls.keys()) {
    const el = tileEls.get(id);
    el && el.remove();
  }
  tileEls.clear();
  grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
  tiles = new Map();
  nextId = 1; score = 0; goalIdx = 0; awaiting = false; over = false;
  discovered = new Set([1, 2]);
  overlay.classList.remove("show");
  updateHud();
  layout();
  spawn(); spawn();
}

function emptyCells() {
  const out = [];
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++)
    if (!grid[r][c]) out.push([r, c]);
  return out;
}

function spawn() {
  const empty = emptyCells();
  if (!empty.length) return;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  const t = { id: nextId++, n: Math.random() < 0.9 ? 1 : 2, r, c };
  grid[r][c] = t;
  tiles.set(t.id, t);
  makeEl(t, "new");
}

const VEC = {
  up:    { r: -1, c: 0 },
  down:  { r: 1,  c: 0 },
  left:  { r: 0,  c: -1 },
  right: { r: 0,  c: 1 },
};

function inB(r, c) { return r >= 0 && r < SIZE && c >= 0 && c < SIZE; }

function move(dir) {
  if (over || awaiting) return;
  const v = VEC[dir];
  const rows = [...Array(SIZE).keys()]; if (v.r === 1) rows.reverse();
  const cols = [...Array(SIZE).keys()]; if (v.c === 1) cols.reverse();
  moved = false;
  for (const t of tiles.values()) t.mergedNow = false;

  for (const r of rows) for (const c of cols) {
    const t = grid[r][c];
    if (!t) continue;
    let nr = r, nc = c;
    while (inB(nr + v.r, nc + v.c) && !grid[nr + v.r][nc + v.c]) { nr += v.r; nc += v.c; }
    const tr = nr + v.r, tc = nc + v.c;
    const next = inB(tr, tc) ? grid[tr][tc] : null;

    if (next && next.n === t.n && !next.mergedNow && t.n < MAX_N) {
      // 合体
      const m = { id: nextId++, n: t.n + 1, r: tr, c: tc, mergedNow: true };
      grid[r][c] = null;
      grid[tr][tc] = m;
      tiles.delete(t.id); tiles.delete(next.id);
      tiles.set(m.id, m);
      // 元の2枚はターゲットへスライドして消える
      t.r = tr; t.c = tc;
      positionEl(t);
      removeEl(t.id, 160);
      removeEl(next.id, 160);
      makeEl(m, "pop");
      score += Math.pow(2, m.n);
      moved = true;
      onCreate(m.n);
    } else if (nr !== r || nc !== c) {
      grid[r][c] = null;
      t.r = nr; t.c = nc;
      grid[nr][nc] = t;
      positionEl(t);
      moved = true;
    }
  }

  if (moved) {
    if (score > best) { best = score; localStorage.setItem("elemMergeBest", best); }
    updateHud();
    setTimeout(() => {
      spawn();
      if (!canMove()) gameOver();
    }, 130);
  }
}

function onCreate(n) {
  if (n > bestElem) {
    bestElem = n;
    localStorage.setItem("elemMergeBestElem", bestElem);
    updateHud();
  }
  if (!discovered.has(n)) {
    discovered.add(n);
    const e = ELEMENTS[n];
    if (e) toast(`<b>新元素発見！ ${e.sym}（${e.name}）</b><br>${e.fun}`);
  }
  if (goalIdx < GOALS.length && n >= GOALS[goalIdx]) {
    const isTrue = GOALS[goalIdx] >= 12;
    goalIdx++;
    awaiting = true;
    setTimeout(() => {
      if (isTrue) {
        ovTitle.textContent = "👑 真のクリア！";
        ovText.textContent = "マグネシウム(Mg)に到達！キミはもう元素マスター。この先はどこまで行けるかな？";
      } else {
        ovTitle.textContent = "🎉 クリア！";
        ovText.textContent = "ネオン(Ne)に到達！次は真のクリア・マグネシウム(Mg)を目指そう！";
      }
      ovContinue.style.display = "";
      overlay.classList.add("show");
    }, 350);
  }
}

function canMove() {
  if (emptyCells().length) return true;
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    const t = grid[r][c];
    if ((inB(r, c + 1) && grid[r][c + 1].n === t.n) ||
        (inB(r + 1, c) && grid[r + 1][c].n === t.n)) return true;
  }
  return false;
}

function gameOver() {
  over = true;
  const e = ELEMENTS[bestElemOnBoard()];
  setTimeout(() => {
    ovTitle.textContent = "ゲームオーバー";
    ovText.textContent = `スコア ${score}・最高元素は ${e.sym}（${e.name}）だった！`;
    ovContinue.style.display = "none";
    overlay.classList.add("show");
  }, 250);
}

function bestElemOnBoard() {
  let m = 1;
  for (const t of tiles.values()) if (t.n > m) m = t.n;
  return m;
}

function updateHud() {
  scoreEl.textContent = score;
  bestEl.textContent = best;
  bestElemEl.textContent = bestElem ? ELEMENTS[bestElem].sym : "-";
}

let toastTimer;
function toast(html) {
  toastEl.innerHTML = html;
  toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), 3200);
}

// ===== 入力 =====
document.addEventListener("keydown", e => {
  const map = {
    ArrowUp: "up", ArrowDown: "down", ArrowLeft: "left", ArrowRight: "right",
    w: "up", s: "down", a: "left", d: "right",
  };
  const dir = map[e.key];
  if (dir) { e.preventDefault(); move(dir); }
});

let sx = 0, sy = 0, swiping = false;
document.addEventListener("touchstart", e => {
  if (e.touches.length !== 1) return;
  sx = e.touches[0].clientX; sy = e.touches[0].clientY; swiping = true;
}, { passive: true });
document.addEventListener("touchmove", e => e.preventDefault(), { passive: false });
document.addEventListener("touchend", e => {
  if (!swiping) return;
  swiping = false;
  const dx = e.changedTouches[0].clientX - sx;
  const dy = e.changedTouches[0].clientY - sy;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
  move(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? "right" : "left") : (dy > 0 ? "down" : "up"));
});

document.getElementById("newGame").addEventListener("click", newGame);
document.getElementById("ovRestart").addEventListener("click", newGame);
ovContinue.addEventListener("click", () => {
  awaiting = false;
  overlay.classList.remove("show");
});
window.addEventListener("resize", layout);

newGame();
</script>
</body>
</html>
